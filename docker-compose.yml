services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "6767:3000"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: slayer
      PGUSER: slayer
      PGPASSWORD: ${PGPASSWORD}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: slayer
      POSTGRES_USER: slayer
      POSTGRES_PASSWORD: ${PGPASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slayer -d slayer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
